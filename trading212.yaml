name: Trading 212
shortDescription: Read account data and manage equity orders and positions via the Trading 212 API
description: |
  # Trading 212 MCP Server

  Interact with your Trading 212 Invest / Stocks ISA account through natural language.
  Read your account summary and open positions, browse instrument and exchange metadata,
  place and cancel equity orders, review historical orders, dividends and transactions,
  and request CSV exports.

  ## Features
  - **Account**: Account cash & investment summary, all open positions
  - **Instruments**: Tradable instrument metadata and exchange schedules
  - **Orders**: Place market / limit / stop / stop-limit orders, list, inspect and cancel orders
  - **History**: Historical orders, paid dividends, account transactions, CSV exports

  ## Environments
  The server targets the **demo / paper** environment by default. Set `TRADING212_LIVE`
  to `true` to operate against the **live** (real money) environment — note that live and
  demo use separate API credentials.

  ## What you'll need to connect
  An API key and secret generated in the Trading 212 app under Settings > API.
  Trading 212's API is available for Invest and Stocks ISA accounts.

metadata:
  categories: Finance
  allow-multiple: "true"
icon: https://www.svgrepo.com/show/501857/line-chart.svg
repoURL: https://github.com/NigelVanHattum/trading212-mcp
runtime: containerized
containerizedConfig:
  image: ghcr.io/nigelvanhattum/trading212-mcp:latest
  port: 8000
  path: "/sse"
env:
  - key: TRADING212_API_KEY
    name: Trading 212 API Key
    required: true
    sensitive: true
    description: API key generated in the Trading 212 app under Settings > API
  - key: TRADING212_API_SECRET
    name: Trading 212 API Secret
    required: true
    sensitive: true
    description: API secret shown once when the key is generated
  - key: TRADING212_LIVE
    name: Use Live Environment
    required: false
    sensitive: false
    description: Set to true to use the live (real money) environment; anything else uses demo/paper (default)

toolPreview:
  - name: get_account_summary
    description: Get a breakdown of the account's cash and investment metrics.
    params: {}
  - name: get_positions
    description: Fetch all open positions with quantity, average price and profit/loss.
    params: {}
  - name: list_instruments
    description: List all tradable instruments and their details.
    params:
      limit: Page size (default 20, max 50)
      cursor: Pagination cursor from a previous page
  - name: list_exchanges
    description: List all accessible exchanges and their working schedules.
    params: {}
  - name: list_orders
    description: List all active (pending) orders.
    params: {}
  - name: get_order
    description: Get a specific pending order by its ID.
    params:
      id: Order ID
  - name: cancel_order
    description: Cancel a pending order by its ID.
    params:
      id: Order ID
  - name: place_market_order
    description: Place a market order (positive quantity buys, negative sells).
    params:
      ticker: Instrument ticker, e.g. AAPL_US_EQ
      quantity: Share quantity; positive = buy, negative = sell
  - name: place_limit_order
    description: Place a limit order that executes at limitPrice or better.
    params:
      ticker: Instrument ticker, e.g. AAPL_US_EQ
      quantity: Share quantity; positive = buy, negative = sell
      limitPrice: Limit price
  - name: place_stop_order
    description: Place a stop order triggered when the price reaches stopPrice.
    params:
      ticker: Instrument ticker, e.g. AAPL_US_EQ
      quantity: Share quantity; positive = buy, negative = sell
      stopPrice: Trigger price
  - name: place_stop_limit_order
    description: Place a stop-limit order triggered at stopPrice, then placed at limitPrice.
    params:
      ticker: Instrument ticker, e.g. AAPL_US_EQ
      quantity: Share quantity; positive = buy, negative = sell
      stopPrice: Trigger price
      limitPrice: Limit price applied after trigger
  - name: get_historical_orders
    description: Access historical order records.
    params:
      limit: Page size (default 20, max 50)
      cursor: Pagination cursor from a previous page
  - name: get_dividends
    description: Retrieve paid dividends.
    params:
      limit: Page size (default 20, max 50)
      cursor: Pagination cursor from a previous page
  - name: get_transactions
    description: Fetch cash movements to and from the account.
    params:
      limit: Page size (default 20, max 50)
      cursor: Pagination cursor from a previous page
  - name: list_exports
    description: List requested CSV reports and their generation status.
    params: {}
  - name: request_export
    description: Request a CSV export of historical account data over a time window.
    params:
      timeFrom: Start of window, ISO-8601
      timeTo: End of window, ISO-8601
